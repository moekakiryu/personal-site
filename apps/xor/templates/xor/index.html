<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>XOR Encryption Tool</title>
    <script type="text/javascript">
      const searchParams = new URLSearchParams(document.location.search)

      const encrypted = searchParams.get('encrypted')
      const paramKey = searchParams.get('key')

      const xorCipher = {
        encrypt: function(string, key) {
          return new TextEncoder()
            .encode(string)
            .map((int, index) => int ^ key[index % key.length].charCodeAt(0))
            .toBase64()
        },
        decrypt: function(base64, key) {
          return new TextDecoder().decode(
            Uint8Array
              .fromBase64(base64)
              .map((int, index) => int ^ key[index % key.length].charCodeAt(0))
          )
        }
      }

      const setAttributeVisibility = (attribute, isVisible) => {
        document.querySelectorAll(`[${attribute}]`).forEach(ele => {
          if (isVisible) {
            ele.classList.remove('hidden')
          } else {
            ele.classList.add('hidden')
          }
        })
      }

      document.addEventListener('DOMContentLoaded', () => {
        const elements = {
          output: document.getElementById('output'),

          // 'Encrypt' form
          textInput: document.getElementById('text-input'),
          keyInput: document.getElementById('key-input'),
          encryptButton: document.getElementById('encrypt-button'),

          // Quick actions
          copyToClipboard: document.getElementById('copy-to-clipboard'),
          getUrl: document.getElementById('get-url'),
        }

        const attributes = {
          encryptOnly: 'encrypt-only',
          decryptOnly: 'decrypt-only',
        }

        elements.encryptButton.addEventListener('click', () => {
          elements.output.textContent = xorCipher.encrypt(
            elements.textInput.value,
            elements.keyInput.value,
          )
          elements.actions.style.display = null
        })

        elements.getUrl.addEventListener('click', () => {
          searchParams.set('encrypted', elements.output.textContent)
          window.location.search = searchParams
        })

        elements.copyToClipboard.addEventListener('click', () => {
          navigator.clipboard.writeText(elements.output.textContent)
        })

        if (encrypted) {
          const key = paramKey ?? prompt('Please enter encryption key')

          elements.output.textContent = xorCipher.decrypt(encrypted, key)
          setAttributeVisibility(attributes.encryptOnly, false)
          setAttributeVisibility(attributes.decryptOnly, true)
        } else {
          setAttributeVisibility(attributes.encryptOnly, true)
          setAttributeVisibility(attributes.decryptOnly, false)
        }
      })
    </script>

    <style>
      .hidden {
        display: none !important;
      }

      .form {
        display: flex;
        flex-direction: column;
        max-width: 300px;
        gap: 1rem;
      }

      .labeled {
        display: flex;
        flex-direction: column;
        gap: .5rem;
      }

      .actions {
        display: flex;
        gap: .5rem;
      }

      .actions > * {
        flex: 100% 1 1;
      }

      label {
        font-weight: 600;
        font-size: .85rem;
      }

      hr {
        width: 100%;
        border-top: 1px solid;
        border-bottom: none;
        margin-block: 0 .5em;
      }

      #output {
        word-break: break-all;
        min-height: 1.25em;
        padding: 8px 12px;
        background-color: #eee;
      }
    </style>
</head>
<body>
  <div class="form">
    <div class="form" encrypt-only>
      <div class="labeled">
        <label for="text-input">Input</label>
        <textarea id="text-input"></textarea>
      </div>

      <div class="labeled">
        <label for="key-input">Key</label>
        <input type="text" id="key-input">
      </div>

      <button id="encrypt-button">Encrypt</button>
      <hr>
    </div>

    <div class="labeled">
      <label for="output" encrypt-only>Result</label>
      <div id="output"></div>
    </div>

    <div class="actions">
      <button id="copy-to-clipboard">Copy to clipboard</button>
      <button id="get-url" encrypt-only>Get URL</button>
    </div>
  </div>
</body>
</html>
